<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Nyx — приватный мессенджер">
  <meta name="theme-color" content="#8b5cf6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Nyx">
  <title>Nyx</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen">
  <div class="auth-container">
    <div class="auth-logo-wrap">
      <div class="auth-logo">N</div>
    </div>
    <h1>Nyx</h1>
    <p class="auth-subtitle">Для своих — в темноте безопаснее</p>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Войти</button>
      <button class="auth-tab" data-tab="register">Регистрация</button>
    </div>

    <div id="auth-error" class="auth-error"></div>

    <div id="login-form" class="auth-form active">
      <input type="email" id="login-email" class="input-field" placeholder="Email" autocomplete="email">
      <input type="password" id="login-password" class="input-field" placeholder="Пароль" autocomplete="current-password">
      <button id="login-btn" class="btn btn-primary">Войти</button>
      <div class="auth-divider">или</div>
      <button id="google-login-btn" class="btn btn-google">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Войти через Google
      </button>
    </div>

    <div id="register-form" class="auth-form">
      <input type="text" id="reg-name" class="input-field" placeholder="Имя" autocomplete="name">
      <div class="input-prefix-wrap">
        <span class="input-prefix">@</span>
        <input type="text" id="reg-username" class="input-field input-with-prefix" placeholder="username">
      </div>
      <input type="email" id="reg-email" class="input-field" placeholder="Email" autocomplete="email">
      <input type="password" id="reg-password" class="input-field" placeholder="Пароль (мин. 6 символов)" autocomplete="new-password">
      <button id="register-btn" class="btn btn-primary">Создать аккаунт</button>
      <div class="auth-divider">или</div>
      <button id="google-register-btn" class="btn btn-google">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Войти через Google
      </button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="screen">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <!-- Row 1: avatar + actions — все кнопки в одну строку -->
      <div class="sidebar-header-row1">
        <button class="avatar-btn" id="my-profile-btn" title="Мой профиль">
          <div id="my-avatar-wrap"></div>
        </button>
        <span style="flex:1"></span>
        <button id="new-chat-btn" class="icon-btn" title="Новый чат">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Настройки">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="theme-toggle-btn" class="icon-btn" title="Сменить тему">
          <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <label class="icon-btn" title="Загрузить тему .tnyx" style="cursor:pointer;">
          <input type="file" id="load-tnyx-input" accept=".tnyx" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </label>
        <a id="admin-panel-btn" href="admin.html" class="icon-btn" title="Админ-панель" style="display:none;text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </a>
      </div>
      <!-- Row 2: search full-width -->
      <div class="sidebar-header-row2">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Поиск чатов и пользователей...">
        </div>
      </div>
    </div>

    <!-- Tabs: Chats / Channels -->
    <div class="sidebar-nav">
      <button class="sidebar-nav-btn active" id="nav-chats" onclick="App.switchSidebarTab('chats')">Чаты</button>
    </div>

    <button id="pwa-install-btn" class="pwa-install-btn">📲 Установить Nyx</button>

    <!-- Chat list -->
    <div id="chat-list-panel">
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        <div class="empty-state-text">Нет чатов</div>
        <div class="empty-state-hint">Нажми кнопку выше чтобы начать</div>
      </div>
    </div>
  </aside>

  <!-- CHAT AREA -->
  <main id="chat-area">
    <!-- Welcome -->
    <div id="welcome-screen" class="welcome-screen">
      <div class="welcome-logo">N</div>
      <div class="welcome-content">
        <h2>Добро пожаловать в Nyx</h2>
        <p>Выбери чат или канал слева</p>
      </div>
    </div>

    <!-- Active Chat -->
    <div id="active-chat" class="active-chat hidden">
      <header class="chat-header">
        <button id="back-btn" class="icon-btn back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
        <div class="chat-header-info" id="chat-header-info">
          <div class="chat-header-avatar" id="chat-header-avatar-wrap"></div>
          <div class="chat-header-text">
            <div id="chat-name" class="chat-name">—</div>
            <div id="chat-status" class="chat-status"></div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button id="search-messages-btn" class="icon-btn" title="Поиск">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
          <button id="chat-info-btn" class="icon-btn" title="Информация">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
        </div>
      </header>

      <div id="pinned-bar" class="pinned-bar hidden">
        <span>📌</span>
        <div><div class="pinned-label">Закреплено</div><div id="pinned-text" class="pinned-text"></div></div>
      </div>

      <div id="chat-search-bar" class="chat-search-bar hidden">
        <input type="text" id="chat-search-input" placeholder="Поиск по сообщениям...">
        <button id="close-search-btn" class="icon-btn">✕</button>
      </div>

      <div id="messages-container" class="messages-container"></div>

      <div id="typing-indicator" class="typing-indicator hidden">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span id="typing-text"></span>
      </div>

      <div id="img-send-preview" class="img-send-preview hidden"></div>
      <div id="reply-preview" class="reply-preview hidden">
        <div class="reply-preview-bar"></div>
        <div class="reply-preview-content">
          <div id="reply-preview-name" class="reply-preview-name"></div>
          <div id="reply-preview-text" class="reply-preview-text"></div>
        </div>
        <button id="cancel-reply-btn" class="icon-btn">✕</button>
      </div>

</div>

      <div class="message-input-area">
        <label for="file-input" class="attach-label" title="Прикрепить фото">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </label>
        <input type="file" id="file-input" accept="image/*" multiple hidden>
        <textarea id="message-input" placeholder="Сообщение..." rows="1"></textarea>
        <button id="send-btn" class="send-btn" title="Отправить">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- DROP OVERLAY -->
<div id="drop-overlay" class="drop-overlay">📸 Перетащи сюда</div>

<!-- ============ MODALS ============ -->

<!-- Profile -->
<div id="profile-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header"><h3>Мой профиль</h3><button class="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="profile-avatar-section">
        <div class="profile-avatar-large" id="my-profile-avatar-wrap" title="Изменить фото">
          <input type="file" id="avatar-input" accept="image/*" hidden>
        </div>
        <button class="btn btn-secondary" id="change-avatar-btn" style="width:auto;padding:6px 16px;font-size:13px;">Изменить фото</button>
      </div>
      <input type="text" id="profile-name" class="input-field" placeholder="Имя">
      <div class="input-prefix-wrap">
        <span class="input-prefix">@</span>
        <input type="text" id="profile-username" class="input-field input-with-prefix" placeholder="username">
      </div>
      <textarea id="profile-bio" class="input-field" placeholder="О себе..." rows="3" style="resize:none;"></textarea>
      <input type="text" id="profile-custom-status" class="input-field" placeholder="Статус (например: 🎮 играю)">
      <input type="text" id="profile-links" class="input-field" placeholder="Ссылка (сайт, соцсети)">
      <button id="save-profile-btn" class="btn btn-primary">Сохранить</button>
      <button id="clear-cache-btn" class="btn btn-secondary">🗑 Очистить кэш</button>
      <button id="logout-btn" class="btn btn-danger">Выйти</button>
    </div>
  </div>
</div>

<!-- New Chat -->
<div id="new-chat-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header"><h3>Новый чат</h3><button class="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="modal-tabs">
        <div class="modal-tab active" data-tab="dm">Личное</div>
        <div class="modal-tab" data-tab="group">Группа</div>
        <div class="modal-tab" data-tab="invite">По ссылке</div>
      </div>
      <div id="dm-tab" class="modal-tab-content active">
        <input type="text" id="dm-search-input" class="input-field" placeholder="Поиск @username или имени">
        <div id="dm-search-results" class="user-search-results"></div>
      </div>
      <div id="group-tab" class="modal-tab-content">
        <div id="group-avatar-section" style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
          <div id="group-avatar-preview" style="width:60px;height:60px;border-radius:50%;overflow:hidden;background:var(--gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;cursor:pointer;flex-shrink:0;">📷</div>
          <input type="file" id="group-avatar-input" accept="image/*" hidden>
          <div style="flex:1"><input type="text" id="group-name-input" class="input-field" placeholder="Название группы"></div>
        </div>
        <input type="text" id="group-search-input" class="input-field" placeholder="Добавить участников">
        <div id="group-search-results" class="user-search-results"></div>
        <div id="selected-members" class="selected-members"></div>
        <button id="create-group-btn" class="btn btn-primary">Создать группу</button>
      </div>
      <div id="invite-tab" class="modal-tab-content">
        <p style="font-size:14px;color:var(--text-secondary);">Введи код приглашения:</p>
        <input type="text" id="invite-code-input" class="input-field" placeholder="Код приглашения">
        <button id="join-invite-btn" class="btn btn-primary">Вступить</button>
      </div>
    </div>
  </div>
</div>


<!-- Chat Info -->
<div id="chat-info-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header"><h3 id="chat-info-modal-title">Информация</h3><button class="modal-close">✕</button></div>
    <div class="modal-body" id="chat-info-body"></div>
  </div>
</div>

<!-- User Profile -->
<div id="user-profile-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header"><h3>Профиль</h3><button class="modal-close">✕</button></div>
    <div class="modal-body" id="user-profile-body"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox-modal" class="modal hidden" style="z-index:3000">
  <div class="modal-overlay" style="background:rgba(0,0,0,0.92)"></div>
  <div style="position:relative;z-index:1;">
    <button class="modal-close" style="position:fixed;top:20px;right:20px;color:#fff;font-size:24px;background:rgba(255,255,255,0.1);width:40px;height:40px;">✕</button>
    <img id="lightbox-img" src="" alt="" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.6);">
  </div>
</div>

<!-- Forward -->
<div id="forward-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header"><h3>Переслать в...</h3><button class="modal-close">✕</button></div>
    <div class="modal-body">
      <input type="text" id="forward-search-input" class="input-field" placeholder="Поиск чата...">
      <div id="forward-chat-list" class="user-search-results"></div>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div id="context-menu" class="context-menu hidden"></div>
<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<!-- QR Code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- NYX SCRIPTS -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/upload.js"></script>
<script src="js/notifications.js"></script>
<script src="js/themes.js"></script>
<script src="js/chats.js"></script>
<script src="js/messages.js"></script>
<script src="js/reports.js"></script>
<script src="js/qr.js"></script>
<script src="js/settings.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
</body>
</html>
